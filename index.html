<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="MH武器大师">
    <meta name="mobile-web-app-capable" content="yes">
    <title>MH武器大师</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --accent: #38bdf8; --bg: #07090f; --text: #cbd5e1; --panel: #111827; --card-bg: rgba(13, 19, 32, 0.9); --border: rgba(56,189,248,0.3); --input-bg: #000; --input-border: #333; --canvas-bg: #000; --stat-bg: #111; --text-muted: #888; --score-color: #10b981; }
        .light-mode { --accent: #0284c7; --bg: #f1f5f9; --text: #0f172a; --panel: #ffffff; --card-bg: #ffffff; --border: #94a3b8; --input-bg: #f8fafc; --input-border: #cbd5e1; --canvas-bg: #f8fafc; --stat-bg: #f1f5f9; --text-muted: #475569; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); padding: 15px; margin: 0; transition: background 0.3s, color 0.3s; padding-bottom: 80px; -webkit-text-size-adjust: 100%; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; flex-wrap: wrap; gap: 10px; }
        .header h2 { margin: 0; font-size: 22px; letter-spacing: 2px; font-weight: 900; }
        .controls-top { display: flex; gap: 8px; align-items: center; }
        .lang-select { background: var(--panel); border: 1px solid var(--border); color: var(--text); padding: 5px; border-radius: 4px; font-size: 13px; cursor: pointer; outline: none; }
        .btn-theme { background: var(--panel); border: 1px solid var(--border); color: var(--text); padding: 8px 12px; border-radius: 4px; font-weight: bold; cursor: pointer; }
        .btn-opt { width: 100%; background: linear-gradient(135deg, var(--accent), #0ea5e9); color: #000; padding: 15px; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .btn-export { width: 100%; background: #10b981; color: #000; padding: 15px; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .btn-reset { width: auto; background: transparent; color: #ef4444; border: 1px solid #ef4444; padding: 0 15px; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; white-space: nowrap; }
        .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px; padding: 15px; margin-bottom: 15px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 10px; }
        label { font-size: 12px; color: var(--text-muted); display: block; margin-bottom: 5px; font-weight: bold; }
        select, input[type="number"], input[type="text"] { width: 100%; padding: 8px; background: var(--input-bg); border: 1px solid var(--input-border); color: var(--accent); border-radius: 4px; box-sizing: border-box; font-weight: bold; font-size: 14px;}
        input:disabled { opacity: 0.5; cursor: not-allowed; }
        .warn-txt { color: #ef4444; font-size: 11px; font-weight: normal; margin-left: 4px; }
        .slider-wrap { display: flex; align-items: center; gap: 10px; }
        input[type="range"] { flex: 1; -webkit-appearance: none; background: var(--input-border); height: 6px; border-radius: 3px; outline: none; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 22px; height: 22px; background: var(--accent); border-radius: 50%; box-shadow: 0 0 5px rgba(0,0,0,0.5); }
        input[type="range"]:disabled::-webkit-slider-thumb { background: #555; }
        .slider-val { font-size: 16px; font-weight: bold; color: var(--accent); width: 65px; text-align: right; }
        #chartContainer { position: relative; width: 100%; height: 200px; background: var(--canvas-bg); border: 1px solid var(--input-border); border-radius: 4px; margin-top: 10px; }
        canvas { display: block; width: 100%; height: 100%; }
        .radar-container { width: 150px; height: 150px; margin: 0 auto; position: relative; }
        .live-stats { display: flex; justify-content: space-between; background: var(--stat-bg); padding: 10px; border-radius: 4px; margin-top: 10px; border: 1px solid var(--input-border); }
        .stat-box { text-align: center; width: 33%; }
        .stat-val { font-size: 18px; font-weight: bold; display: block; }
        .stat-lbl { font-size: 11px; color: var(--text-muted); }
        .index-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; margin-top: 15px; }
        .index-card { background: var(--stat-bg); border: 1px solid var(--input-border); border-radius: 4px; padding: 8px 2px; text-align: center; }
        .index-val { font-size: 16px; font-weight: bold; display: block; }
        .index-lbl { font-size: 10px; color: var(--text-muted); display: block; margin-top: 4px; }
        .aim-guide { background: rgba(16, 185, 129, 0.1); border: 1px solid #10b981; padding: 12px; border-radius: 4px; margin-top: 15px; font-size: 14px; font-weight: bold; color: #10b981; text-align: center; letter-spacing: 1px;}
        #exportCanvas { position: absolute; left: -9999px; top: 0; width: 600px; background: #fff; color: #000; padding: 20px; font-family: sans-serif; box-sizing: border-box; }
        .exp-title { font-size: 24px; font-weight: bold; border-bottom: 2px solid #000; padding-bottom: 10px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: baseline; }
        .exp-section { margin-bottom: 15px; border: 1px solid #ddd; padding: 10px; border-radius: 4px; }
        .exp-row { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 14px; }
        .exp-row span:last-child { font-weight: bold; color: #0284c7; }
        .score-box { font-size: 40px; font-weight: 900; font-style: italic; color: var(--score-color); line-height: 1; }
        .tuning-box { background: rgba(234, 179, 8, 0.1); border: 1px solid #eab308; padding: 10px; border-radius: 4px; margin-top: 10px; }
    </style>
</head>
<body>

<div style="max-width: 800px; margin: auto;">
    <div class="header">
        <h2 data-i18n="app_name">MH武器大师</h2>
        <div class="controls-top">
            <select class="lang-select" id="langSwitcher" onchange="changeLanguage(this.value)">
                <option value="zh">🇨🇳 中文</option>
                <option value="en">🇬🇧 English</option>
                <option value="ja">🇯🇵 日本語</option>
            </select>
            <button class="btn-theme" onclick="toggleTheme()" id="themeBtn">☀️</button>
        </div>
    </div>

    <div style="display:flex; gap:10px; margin-bottom: 15px;">
        <button class="btn-opt" onclick="autoOptimize()" data-i18n="btn_optimize">⚡ 智能最优配置</button>
        <button class="btn-export" onclick="exportConfig()" data-i18n="btn_export">📸 导出配置单</button>
        <button class="btn-reset" onclick="resetAll()">🗑️</button>
    </div>

    <div class="card">
        <label data-i18n="gun_length">枪管拉距 / 有效行程</label>
        <div class="slider-wrap">
            <input type="range" id="gunLen" min="60" max="150" step="5" value="100" oninput="dynamicLimit(true); updateAll();">
            <span class="slider-val" id="gunLenVal">100 cm</span>
        </div>

        <div class="grid" style="margin-top: 15px;">
            <div>
                <label data-i18n="sys_type">系统架构</label>
                <select id="sysType" onchange="updateSysUI(); dynamicLimit(true); updateAll();">
                    <option value="standard" data-i18n="opt_standard">传统皮筋</option>
                    <option value="roller" data-i18n="opt_roller">单滚轮 (Roller)</option>
                    <option value="double_roller" data-i18n="opt_double_roller">双滚轮 (Double Roller)</option>
                    <option value="invert" data-i18n="opt_invert">逆变滑轮 (Invert)</option>
                </select>
            </div>
            <div>
                <label data-i18n="gun_shape">枪身形态</label>
                <select id="gunShape" onchange="updateAll()">
                    <option value="al_tube" data-i18n="shape_al">铝合金 标准圆管</option>
                    <option value="carbon_cuttlefish" selected data-i18n="shape_carbon">碳纤维 墨鱼骨</option>
                    <option value="wood_cuttlefish" data-i18n="shape_wood_c">木质 墨鱼骨</option>
                    <option value="wood_block" data-i18n="shape_wood_b">木质 重型宽体</option>
                </select>
            </div>
            
            <div id="uiStandard">
                <label data-i18n="band_count">皮筋数量</label>
                <select id="stdCount" onchange="updateAll()">
                    <option value="1">1</option><option value="2" selected>2</option><option value="3">3</option><option value="4">4</option>
                </select>
            </div>
            <div id="uiRoller" style="display:none;">
                <label data-i18n="band_count">皮筋数量</label>
                <select disabled><option data-i18n="roller_band_info">1 组主皮筋 (2根)</option></select>
            </div>
            <div id="uiDoubleRoller" style="display:none;">
                <label data-i18n="band_count">皮筋数量</label>
                <select disabled><option data-i18n="d_roller_band_info">2 组主皮筋 (4根)</option></select>
            </div>
            <div id="uiInvert" style="display:none;">
                <label data-i18n="invert_sub">逆变副皮筋数量</label>
                <select id="invSubCount" onchange="updateAll()">
                    <option value="1">1</option><option value="2" selected>2</option><option value="3">3</option><option value="4">4</option>
                </select>
            </div>
            
            <div>
                <label data-i18n="reel">线轮 (Reel)</label>
                <select id="hasReel" onchange="toggleReelUI(); updateAll();">
                    <option value="no" selected data-i18n="no">无线轮</option>
                    <option value="yes" data-i18n="yes">有线轮</option>
                </select>
            </div>
        </div>

        <div style="margin-top: 15px; padding-top: 10px; border-top: 1px solid var(--input-border);">
            <label style="display:flex; justify-content:space-between; margin-bottom:10px;">
                <span data-i18n="wishbone">叉骨线长度 (Wishbone)</span>
                <span style="font-weight:normal; display:flex; align-items:center; gap:5px;">
                    <input type="checkbox" id="autoWishbone" checked onchange="updateAll()" style="width:auto; margin:0;"> <span data-i18n="auto">自动</span>
                </span>
            </label>
            <div class="slider-wrap">
                <input type="range" id="wishboneLen" min="0" max="25" step="1" value="10" oninput="document.getElementById('autoWishbone').checked = false; updateAll();">
                <span class="slider-val" id="wishboneLenVal">10 cm</span>
            </div>
        </div>

        <div id="uiExtension" style="display:none; margin-top: 5px; padding-top: 10px;">
            <label style="display:flex; justify-content:space-between; margin-bottom:10px;">
                <span data-i18n="ext_line">底挂延长线 (Extension)</span>
                <span style="font-weight:normal; display:flex; align-items:center; gap:5px;">
                    <input type="checkbox" id="autoExt" checked onchange="updateAll()" style="width:auto; margin:0;"> <span data-i18n="auto">自动</span>
                </span>
            </label>
            <div class="slider-wrap">
                <input type="range" id="extLen" min="0" max="80" step="1" value="10" oninput="document.getElementById('autoExt').checked = false; updateAll();">
                <span class="slider-val" id="extLenVal">10 cm</span>
            </div>
        </div>
        
        <div id="uiReelConfig" class="grid" style="display:none; margin-top:12px; padding-top:12px; border-top:1px solid var(--input-border);">
            <div>
                <label data-i18n="reel_cap">线轮容量</label>
                <select id="reelCap" onchange="updateAll()">
                    <option value="30">30m</option><option value="50" selected>50m</option><option value="70">70m</option>
                </select>
            </div>
            <div>
                <label data-i18n="reel_line">线轮线材规格</label>
                <select id="reelLine" onchange="updateAll()">
                    <option value="1.5" selected>1.5mm</option><option value="2.0">2.0mm</option>
                </select>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="grid">
            <div>
                <label data-i18n="band_brand">皮筋品牌</label>
                <select id="bandBrand" onchange="updateModels(); updateAll();">
                    <option value="sigalsub" selected>Sigalsub</option>
                    <option value="primeline">Primeline</option>
                    <option value="roballen">Rob Allen</option>
                </select>
            </div>
            <div>
                <label data-i18n="band_model">皮筋型号与直径</label>
                <select id="bandModel" onchange="updateAll()"></select>
            </div>
            <div>
                <label style="display:flex; justify-content:space-between;">
                    <span data-i18n="shaft_dia">箭杆直径 (mm)</span><span id="shaftWarnTxt" class="warn-txt"></span>
                </label>
                <select id="shaftDia" onchange="updateAll()">
                    <option value="6.5">6.5</option><option value="7.0" selected>7.0</option><option value="7.5">7.5</option><option value="8.0">8.0</option>
                </select>
            </div>
            <div>
                <label data-i18n="flopper">枪头倒刺结构</label>
                <select id="flopperType" onchange="dynamicLimit(true); updateAll();">
                    <option value="top" data-i18n="flopper_top">上倒刺</option>
                    <option value="bottom" selected data-i18n="flopper_bottom">下倒刺</option>
                    <option value="double" data-i18n="flopper_double">双倒刺 (+5cm)</option>
                    <option value="slip" data-i18n="flopper_slip">滑套 Slip Tip (+5cm)</option>
                </select>
            </div>
        </div>
        <div style="margin-top: 15px;">
            <label style="display:flex; justify-content:space-between;">
                <span><span data-i18n="shaft_len">箭杆总长度</span> <span id="shaftLenWarn" class="warn-txt" style="display:none;"></span></span>
                <span id="shaftHintTxt" style="color:var(--text-muted); font-weight:normal;"></span>
            </label>
            <div class="slider-wrap">
                <input type="range" id="shaftLen" step="5" oninput="document.getElementById('shaftLenWarn').style.display='none'; updateAll();">
                <span class="slider-val" id="shaftLenVal">- cm</span>
            </div>
        </div>

        <div class="tuning-box">
            <label style="display:flex; justify-content:space-between; color:#eab308; font-size:13px;">
                <span data-i18n="tuning_mode">现货调校模式 (逆向解算)</span>
                <span style="display:flex; align-items:center; gap:5px;">
                    <input type="checkbox" id="lockBand" onchange="toggleTuningMode(); updateAll();" style="width:auto; margin:0;"> <span data-i18n="lock_band">锁定皮筋长度</span>
                </span>
            </label>
            <div id="tuningInputs" style="display:none; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 8px;">
                <div>
                    <label style="color:#fff;" data-i18n="input_main_band">主皮筋单侧裁长 (cm)</label>
                    <input type="number" id="inputMainBand" value="50" step="1" oninput="updateAll()">
                </div>
                <div id="tuningSubBox" style="display:none;">
                    <label style="color:#fff;" data-i18n="input_sub_band">副皮筋单侧裁长 (cm)</label>
                    <input type="number" id="inputSubBand" value="40" step="1" oninput="updateAll()">
                </div>
            </div>
        </div>

        <div style="margin-top: 15px; padding-top: 15px; border-top: 1px solid var(--input-border);">
            <label style="display:flex; justify-content:space-between;">
                <span><span data-i18n="stretch_ratio">目标拉伸比 (倍)</span><span id="ratioWarnTxt" class="warn-txt"></span></span>
                <span id="stretchRatioVal" style="color:var(--accent); font-weight:bold; font-size:16px;">3.3 x</span>
            </label>
            <div class="slider-wrap" style="margin-top: 8px;">
                <input type="range" id="stretchRatio" min="2.0" max="5.0" step="0.1" value="3.3" oninput="updateAll()">
            </div>
        </div>
        <div style="margin-top:10px; font-size:13px; color:#aaa; display:flex; justify-content:space-between;">
            <span><span data-i18n="cut_main">主皮筋裁长:</span> <strong id="resCutLen" style="color:#fff;">-</strong></span>
            <span id="resSubLenBox" style="display:none;"><span data-i18n="cut_sub">副皮筋:</span> <strong id="resSubLen" style="color:#fff;">-</strong></span>
        </div>
    </div>

    <div class="card" style="border-color: var(--accent);">
        <div style="display:flex; justify-content:space-between; align-items:center; border-bottom: 1px solid var(--input-border); padding-bottom: 15px; margin-bottom: 15px;">
            <div>
                <span style="font-size:12px; color:var(--text-muted); display:block;" data-i18n="total_score">综合实战评分 (0-100)</span>
                <div class="score-box" id="resScore">0</div>
                <span id="resRatingDesc" style="font-size:12px; color:var(--text-muted);">-</span>
            </div>
            <div style="text-align:right;">
                <span style="font-size:12px; color:var(--text-muted); display:block;" data-i18n="thrust">总推力预估</span>
                <strong id="resForce" style="font-size:24px; color:#fff;">0 kg</strong>
                <div style="font-size:11px; color:var(--text-muted); margin-top:4px;">
                    <span data-i18n="weight_buoy">配平总重</span>: <span id="resWeight" style="color:#fff;">- kg</span>
                </div>
            </div>
        </div>

        <div style="display:flex; justify-content:space-between; align-items:center; gap:10px;">
            <div style="flex:1;">
                <div class="index-grid" style="margin-top:0;">
                    <div class="index-card"><span class="index-val" id="idxPain">-</span><span class="index-lbl" data-i18n="idx_pain">装填</span></div>
                    <div class="index-card"><span class="index-val" id="idxRecoil">-</span><span class="index-lbl" data-i18n="idx_recoil">后坐力</span></div>
                    <div class="index-card"><span class="index-val" id="idxSwing">-</span><span class="index-lbl" data-i18n="idx_swing">摆动性</span></div>
                    <div class="index-card"><span class="index-val" id="idxBuoy">-</span><span class="index-lbl" data-i18n="idx_buoy">浮力</span></div>
                    <div class="index-card" style="grid-column: span 2;"><span class="index-val" id="idxPort">-</span><span class="index-lbl" data-i18n="idx_port">便携</span></div>
                </div>
            </div>
            <div class="radar-container"><canvas id="radarCanvas"></canvas></div>
        </div>

        <div id="chartContainer" style="margin-top:20px;"><canvas id="trajCanvas"></canvas></div>

        <div style="margin-top: 15px;">
            <label style="color:var(--accent); display:flex; justify-content:space-between;">
                <span data-i18n="scrub_tip">拖动准星查看预瞄落点</span>
                <span style="font-weight:bold; color:#fff;"><span data-i18n="dist">距离</span> <span id="scrubDistTxt">5.0</span> m</span>
            </label>
            <div class="slider-wrap" style="margin-top: 5px;">
                <input type="range" id="distScrubber" min="0" max="10" step="0.1" value="5" oninput="updateScrubber()">
            </div>
        </div>
        
        <div id="aimGuideTxt" class="aim-guide">-</div>

        <div class="live-stats">
            <div class="stat-box"><span class="stat-val" id="liveDrop" style="color:#ef4444;">0.0</span><span class="stat-lbl" data-i18n="drop">下坠 (cm)</span></div>
            <div class="stat-box"><span class="stat-val" id="liveSpeed" style="color:#3b82f6;">0.0</span><span class="stat-lbl" data-i18n="speed">速度 (m/s)</span></div>
            <div class="stat-box"><span class="stat-val" id="liveEnergy" style="color:#eab308;">0</span><span class="stat-lbl" data-i18n="energy">剩余动能 (J)</span></div>
        </div>
    </div>
</div>

<div id="exportCanvas">
    <div class="exp-title">
        <span data-i18n="exp_title">MH武器大师 配置单</span>
        <div style="text-align:right;">
            <div style="font-size:36px; font-weight:900; color:#10b981; line-height:1;" id="expScoreVal">0</div>
            <div style="font-size:12px; color:#555;" data-i18n="total_score">综合实战评分</div>
        </div>
    </div>
    <div style="display:flex; justify-content:space-between; align-items:center; border:1px solid #ddd; padding:10px; border-radius:4px; margin-bottom:15px;">
        <img id="expRadarImg" style="width:130px; height:130px;">
        <div style="flex:1; padding-left:15px; font-size:12px; line-height:1.6;">
            <div><strong data-i18n="idx_recoil">后坐力</strong>: <span id="eRcl"></span> | <strong data-i18n="idx_buoy">浮力</strong>: <span id="eBuy"></span></div>
            <div><strong data-i18n="idx_swing">摆动性</strong>: <span id="eSwg"></span> | <strong data-i18n="idx_pain">装填</strong>: <span id="ePan"></span></div>
            <div style="margin-top:5px; color:#eab308; font-weight:bold;">4m <span data-i18n="energy">动能</span>: <span id="eEgy"></span> J | <span data-i18n="drop">下坠</span>: <span id="eDrp"></span> cm</div>
        </div>
    </div>
    <div class="exp-section">
        <div class="exp-row"><span data-i18n="exp_gun">基础与架构:</span> <span id="expGun">-</span></div>
        <div class="exp-row"><span data-i18n="exp_weight">净重与配平:</span> <span id="expWeight">-</span></div>
    </div>
    <div class="exp-section">
        <div class="exp-row"><span data-i18n="exp_band">皮筋配置:</span> <span id="expBandModel">-</span></div>
        <div class="exp-row"><span data-i18n="exp_ratio">拉伸比与裁长:</span> <span id="expBandData">-</span></div>
        <div class="exp-row"><span data-i18n="exp_thrust">总推力预估:</span> <span id="expForce">-</span></div>
    </div>
    <div class="exp-section">
        <div class="exp-row"><span data-i18n="exp_shaft">弹药与枪头:</span> <span id="expShaft">-</span></div>
    </div>
    <div style="font-size:12px; color:#888; text-align:right; margin-top:10px;" data-i18n="exp_footer">由 MH武器大师 生成</div>
</div>

<script>
const translations = {

};

let currentLang = 'zh';
const bandDB = {
    "primeline": [ {name: "14mm Small ID", val: "14,1.13"}, {name: "16mm Small ID", val: "16,1.15", sel:true}, {name: "17.5mm Small ID", val: "17.5,1.16"} ],
    "sigalsub": [ {name: "14.5mm Extreme", val: "14.5,1.18"}, {name: "16mm Extreme", val: "16,1.20", sel:true}, {name: "17.5mm Extreme", val: "17.5,1.22"} ],
    "roballen": [ {name: "14mm Blue", val: "14,1.05"}, {name: "16mm Blue", val: "16,1.06", sel:true} ]
};

let trajData = [];
let isLightMode = false;
let currentScore = 0;

function t(key, ...args) {
    let text = translations[currentLang][key] || translations['en'][key] || key;
    args.forEach((val, i) => { text = text.replace(`{${i}}`, val); });
    return text;
}

function changeLanguage(lang) {
    currentLang = lang;
    document.querySelectorAll('[data-i18n]').forEach(el => el.innerText = t(el.getAttribute('data-i18n')));
    updateAll();
}

function toggleTheme() {
    isLightMode = !isLightMode;
    document.body.classList.toggle('light-mode', isLightMode);
    document.getElementById('themeBtn').innerText = isLightMode ? '🌙' : '☀️';
    updateAll(); 
}

function initUI() { 
    updateModels(); 
    document.getElementById('bandModel').value = '16,1.20';
    updateSysUI(); 
    dynamicLimit(true); 
    changeLanguage('zh');
}

function resetAll() {
    document.getElementById('gunLen').value = 100;
    document.getElementById('sysType').value = 'standard';
    document.getElementById('gunShape').value = 'carbon_cuttlefish';
    document.getElementById('stdCount').value = '2';
    document.getElementById('hasReel').value = 'no';
    document.getElementById('autoWishbone').checked = true;
    document.getElementById('autoExt').checked = true;
    document.getElementById('lockBand').checked = false;
    toggleTuningMode(); toggleReelUI();
    document.getElementById('bandBrand').value = 'sigalsub';
    updateModels();
    document.getElementById('bandModel').value = '16,1.20';
    document.getElementById('stretchRatio').value = 3.3;
    document.getElementById('shaftDia').value = '7.0';
    dynamicLimit(true); updateSysUI(); updateAll();
}

function toggleTuningMode() {
    const isLocked = document.getElementById('lockBand').checked;
    document.getElementById('stretchRatio').disabled = isLocked;
    document.getElementById('tuningInputs').style.display = isLocked ? 'grid' : 'none';
    document.getElementById('tuningSubBox').style.display = (isLocked && document.getElementById('sysType').value === 'invert') ? 'block' : 'none';
}

function toggleReelUI() {
    document.getElementById('uiReelConfig').style.display = document.getElementById('hasReel').value === 'yes' ? 'grid' : 'none';
}

function dynamicLimit(forceSync = false) {
    const gunLen = parseFloat(document.getElementById('gunLen').value);
    const flopper = document.getElementById('flopperType').value;
    let minShaft = gunLen + 20 + ((flopper === 'double' || flopper === 'slip') ? 5 : 0);
    let recShaft = minShaft + 10;
    const slider = document.getElementById('shaftLen');
    slider.min = minShaft; slider.max = gunLen + 60;
    document.getElementById('shaftHintTxt').innerText = `Min: ${minShaft}cm | Rec: ${recShaft}cm`;
    if(forceSync || parseFloat(slider.value) < minShaft || !slider.value) { slider.value = recShaft; document.getElementById('shaftLenWarn').style.display = 'inline'; }
}

function autoOptimize() {
    document.getElementById('lockBand').checked = false; toggleTuningMode();
    const gunLen = parseFloat(document.getElementById('gunLen').value);
    const sys = document.getElementById('sysType').value;
    document.getElementById('bandBrand').value = 'sigalsub'; updateModels();
    document.getElementById('flopperType').value = 'bottom';
    document.getElementById('autoWishbone').checked = true;
    document.getElementById('autoExt').checked = true;

    if (sys === 'standard') {
        document.getElementById('stdCount').value = gunLen <= 85 ? '1' : '2';
        document.getElementById('bandModel').value = gunLen <= 110 && gunLen > 85 ? '14.5,1.18' : '16,1.20';
        document.getElementById('shaftDia').value = gunLen <= 85 ? '6.5' : (gunLen > 110 ? '7.5' : '7.0');
        document.getElementById('stretchRatio').value = gunLen <= 110 && gunLen > 85 ? 3.5 : 3.4;
    } else {
        document.getElementById('bandModel').value = sys==='double_roller' ? '14.5,1.18' : '16,1.20';
        document.getElementById('shaftDia').value = gunLen > 110 ? '8.0' : '7.5';
        document.getElementById('stretchRatio').value = 3.6;
    }
    document.getElementById('shaftLen').value = gunLen + (sys === 'standard' ? 30 : 20);
    document.getElementById('shaftLenWarn').style.display = 'none';
    dynamicLimit(false); updateSysUI(); updateAll();
}

function updateSysUI() {
    const sys = document.getElementById('sysType').value;
    document.getElementById('uiStandard').style.display = sys === 'standard' ? 'block' : 'none';
    document.getElementById('uiRoller').style.display = sys === 'roller' ? 'block' : 'none';
    document.getElementById('uiDoubleRoller').style.display = sys === 'double_roller' ? 'block' : 'none';
    document.getElementById('uiInvert').style.display = sys === 'invert' ? 'block' : 'none';
    document.getElementById('uiExtension').style.display = sys !== 'standard' ? 'block' : 'none';
    toggleTuningMode();
}

function updateModels() {
    const brand = document.getElementById('bandBrand').value;
    const modelSel = document.getElementById('bandModel');
    modelSel.innerHTML = '';
    bandDB[brand].forEach(m => {
        let opt = document.createElement('option');
        opt.value = m.val; opt.innerText = m.name;
        if(m.sel) opt.selected = true;
        modelSel.appendChild(opt);
    });
}

function updateAll() {
    const gunLen = parseFloat(document.getElementById('gunLen').value);
    document.getElementById('gunLenVal').innerText = gunLen + ' cm';
    const shaftLen = parseFloat(document.getElementById('shaftLen').value);
    document.getElementById('shaftLenVal').innerText = shaftLen + ' cm';
    const sys = document.getElementById('sysType').value;

    let wLen = parseFloat(document.getElementById('wishboneLen').value);
    if(document.getElementById('autoWishbone').checked) { wLen = 10; document.getElementById('wishboneLen').value = wLen; }
    document.getElementById('wishboneLenVal').innerText = wLen + ' cm';

    let extLen = parseFloat(document.getElementById('extLen').value);
    if(sys !== 'standard' && document.getElementById('autoExt').checked) {
        extLen = sys === 'invert' ? Math.round(gunLen * 0.25) : Math.round(gunLen * 0.1);
        document.getElementById('extLen').value = extLen;
    } else if (sys === 'standard') extLen = 0;
    document.getElementById('extLenVal').innerText = extLen + ' cm';

    const bData = document.getElementById('bandModel').value.split(',');
    const bDia = parseFloat(bData[0]); const bElas = parseFloat(bData[1]);
    const isLocked = document.getElementById('lockBand').checked;
    
    let ratioMain = parseFloat(document.getElementById('stretchRatio').value);
    let ratioSub = ratioMain;
    let cutMain = 0, cutSub = 0;

    if(isLocked) {
        cutMain = parseFloat(document.getElementById('inputMainBand').value) || 1;
        if(sys === 'standard') ratioMain = ((gunLen - wLen) * 2) / cutMain;
        else if(sys === 'invert') ratioMain = Math.max(5, gunLen - wLen - extLen) / cutMain;
        else ratioMain = Math.max(5, gunLen * 2 + 10 - wLen - extLen) / cutMain;
        
        if(sys === 'invert') {
            cutSub = parseFloat(document.getElementById('inputSubBand').value) || 1;
            ratioSub = (gunLen * 1.6) / cutSub;
        }
        document.getElementById('stretchRatio').value = ratioMain.toFixed(1);
    } else {
        cutMain = sys === 'standard' ? ((gunLen - wLen) * 2) / ratioMain : (sys === 'invert' ? Math.max(5, gunLen - wLen - extLen) / ratioMain : Math.max(5, gunLen * 2 + 10 - wLen - extLen) / ratioMain);
        cutSub = sys === 'invert' ? (gunLen * 1.6) / ratioSub : 0;
    }
    
    document.getElementById('stretchRatioVal').innerText = ratioMain.toFixed(1) + ' x';
    let rWarn = "", rVeto = false;
    if (ratioMain < 2.5) { rWarn = t('warn_weak'); rVeto = true; }
    else if (ratioMain > 3.8) { rWarn = t('warn_break'); rVeto = true; }
    document.getElementById('ratioWarnTxt').innerText = rWarn;
    
    document.getElementById('resCutLen').innerText = cutMain.toFixed(1) + ' cm';
    document.getElementById('resSubLenBox').style.display = sys === 'invert' ? 'inline' : 'none';
    if(sys === 'invert') document.getElementById('resSubLen').innerText = cutSub.toFixed(1) + ' cm';

    let forceMain = Math.pow(bDia/16, 2) * (ratioMain/3.3) * bElas * 50;
    let totalForce = 0;
    if(sys === 'standard') totalForce = forceMain * parseInt(document.getElementById('stdCount').value);
    else if(sys === 'roller') totalForce = forceMain;
    else if(sys === 'double_roller') totalForce = forceMain * 2;
    else if(sys === 'invert') {
        let forceSub = Math.pow(bDia/16, 2) * (ratioSub/3.3) * bElas * 50;
        totalForce = forceMain + (forceSub * parseInt(document.getElementById('invSubCount').value));
    }
    document.getElementById('resForce').innerText = totalForce.toFixed(1) + ' kg';

    const sDia = parseFloat(document.getElementById('shaftDia').value);
    let sVeto = false;
    if (totalForce > 50 && sDia <= 6.5) { document.getElementById('shaftWarnTxt').innerText = t('warn_bend'); sVeto = true; }
    else document.getElementById('shaftWarnTxt').innerText = "";

    const rhoW = 1025; const shaftMass = Math.PI * Math.pow(sDia/2000, 2) * (shaftLen/100) * 7750;
    const gShape = document.getElementById('gunShape').value;
    let gunVol = 0, gunDen = 0;
    if(gShape==='al_tube'){ gunVol=Math.PI*Math.pow(0.014,2)*(gunLen/100); gunDen=800; }
    if(gShape==='carbon_cuttlefish'){ gunVol=0.05*0.03*0.8*(gunLen/100); gunDen=600; }
    if(gShape==='wood_cuttlefish'){ gunVol=0.05*0.035*0.8*(gunLen/100); gunDen=720; }
    if(gShape==='wood_block'){ gunVol=0.06*0.04*(gunLen/100); gunDen=750; }
    
    let totalMass = gunVol*gunDen + 0.4 + shaftMass + (sys.includes('roller')?0.2:0) + (sys==='invert'?0.3:0);
    if(document.getElementById('hasReel').value === 'yes') {
        let rCap = parseInt(document.getElementById('reelCap').value);
        totalMass += 0.15 + (rCap * (parseFloat(document.getElementById('reelLine').value)===1.5?0.0015:0.0025)); 
    }
    
    let rawBuoy = (gunVol * rhoW) - totalMass;
    let ballast = rawBuoy > 0.15 ? rawBuoy : 0;
    totalMass += ballast;
    
    document.getElementById('resWeight').innerText = totalMass.toFixed(2);

    let idxPain = Math.max(1, Math.min(10, Math.round(11 - (Math.pow(bDia/16, 2)*(ratioMain/3.0)*(gunLen/100)*5)*(sys==='invert'?0.5:1))));
    let idxRecoil = Math.max(1, Math.min(10, Math.round(11 - ((totalForce/50)*(shaftMass/0.4)/(totalMass+1.5))*(sys==='invert'?0.2:(sys==='double_roller'?1.5:(sys==='roller'?0.8:1.0)))*4)));
    let idxSwing = Math.max(1, Math.min(10, Math.round(10 - ((gunLen-60)/20) - (gShape==='al_tube'?0:(gShape==='carbon_cuttlefish'?0.5:2.5)) + (sys==='invert'?2:0) - (document.getElementById('hasReel').value==='yes'?1:0))));
    let idxBuoy = Math.max(1, Math.min(10, Math.round(10 - Math.abs(((gunVol*rhoW)-totalMass)*15))));
    let idxPort = Math.max(1, Math.min(10, Math.round(15 - (shaftLen/30) - (totalMass*1.2))));

    document.getElementById('idxPain').innerText = idxPain; document.getElementById('idxRecoil').innerText = idxRecoil;
    document.getElementById('idxSwing').innerText = idxSwing; document.getElementById('idxBuoy').innerText = idxBuoy; document.getElementById('idxPort').innerText = idxPort;

    let workDist = Math.max(0.1, (gunLen - wLen)/100);
    let energy = totalForce * 9.81 * workDist * 0.5 * (sys.includes('roller')?1.4:(sys==='invert'?1.5:1.0));
    let v0 = Math.sqrt(2 * energy / shaftMass) * 0.7; 
    
    trajData = []; let cV = v0, cT = 0, e4=0, d4=0;
    let bDrag = 0.5 * rhoW * Math.PI * Math.pow(sDia/2000,2) * 0.05 * (document.getElementById('flopperType').value==='slip'?1.25:1.0);
    let gEff = 9.81 * (1 - rhoW/7750) * (document.getElementById('flopperType').value==='top'?0.92:1.08);

    for (let x=0; x<=10; x+=0.1) {
        cV -= (bDrag/shaftMass)*cV*cV*0.1; if(cV<0) cV=0;
        if(cV>0) cT += 0.1/cV;
        let d = 0.5*gEff*cT*cT*100; let e = 0.5*shaftMass*cV*cV;
        trajData.push({dist:x, drop:d, speed:cV, energy:e});
        if(Math.abs(x-4.0)<0.05) { e4=e; d4=d; }
    }

    let twr = totalForce / shaftMass;
    let score = 0;
    if(rVeto || sVeto) {
        score = Math.floor(Math.random() * 10 + 25);
        document.getElementById('resScore').style.color = '#ef4444';
        document.getElementById('resRatingDesc').innerText = "FATAL ERROR";
    } else {
        let scDmg = Math.min(15, (e4/30)*15) + Math.min(15, (5/Math.max(0.1, d4))*15);
        let scRec = (idxRecoil/10)*20;
        let scBuy = (idxBuoy/10)*20;
        let scTwr = Math.max(0, 15 - Math.abs(twr-250)/10);
        let scSwg = (idxSwing/10)*15;
        score = Math.min(100, Math.round(scDmg + scRec + scBuy + scTwr + scSwg));
        
        if(score>=90) { document.getElementById('resScore').style.color = '#a855f7'; document.getElementById('resRatingDesc').innerText = "Legendary!"; }
        else if(score>=75) { document.getElementById('resScore').style.color = '#f59e0b'; document.getElementById('resRatingDesc').innerText = "Pro Grade"; }
        else if(score>=60) { document.getElementById('resScore').style.color = '#10b981'; document.getElementById('resRatingDesc').innerText = "Balanced"; }
        else { document.getElementById('resScore').style.color = '#3b82f6'; document.getElementById('resRatingDesc').innerText = "Imbalanced"; }
    }
    
    currentScore = score;
    document.getElementById('resScore').innerText = score;

    drawRadar([idxPain, idxRecoil, idxSwing, idxBuoy, idxPort]);
    drawCanvas(); updateScrubber(); prepareExportData();
}

function drawRadar(vals = [1,1,1,1,1]) {
    const cvs = document.getElementById('radarCanvas');
    const ctx = cvs.getContext('2d');
    const dpr = window.devicePixelRatio || 1;
    const baseW = 150, baseH = 150; 
    cvs.width = baseW * dpr; cvs.height = baseH * dpr;
    ctx.scale(dpr, dpr);
    ctx.clearRect(0,0,baseW,baseH);
    
    const cx = baseW/2, cy = baseH/2, r = 40;
    
    ctx.strokeStyle = isLightMode ? '#cbd5e1' : '#333';
    ctx.lineWidth = 1;
    for(let i=1; i<=5; i++) {
        ctx.beginPath();
        for(let j=0; j<5; j++) {
            let a = -Math.PI/2 + (Math.PI*2/5)*j;
            let px = cx + Math.cos(a) * (r*i/5);
            let py = cy + Math.sin(a) * (r*i/5);
            j===0 ? ctx.moveTo(px,py) : ctx.lineTo(px,py);
        }
        ctx.closePath(); ctx.stroke();
    }
    
    ctx.beginPath();
    ctx.fillStyle = isLightMode ? 'rgba(2, 132, 199, 0.4)' : 'rgba(56, 189, 248, 0.4)';
    ctx.strokeStyle = isLightMode ? '#0284c7' : '#38bdf8';
    ctx.lineWidth = 2;
    for(let j=0; j<5; j++) {
        let a = -Math.PI/2 + (Math.PI*2/5)*j;
        let v = Math.max(1, Math.min(10, vals[j]));
        let px = cx + Math.cos(a) * (r*v/10);
        let py = cy + Math.sin(a) * (r*v/10);
        j===0 ? ctx.moveTo(px,py) : ctx.lineTo(px,py);
    }
    ctx.closePath(); ctx.fill(); ctx.stroke();
    
    const labels = [t('idx_pain'), t('idx_recoil'), t('idx_swing'), t('idx_buoy'), t('idx_port')];
    ctx.font = 'bold 11px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    
    for(let j=0; j<5; j++) {
        let a = -Math.PI/2 + (Math.PI*2/5)*j;
        let textR = r + 18; 
        let px = cx + Math.cos(a) * textR;
        let py = cy + Math.sin(a) * textR;
        
        if(vals[j] <= 3) {
            ctx.fillStyle = '#ef4444'; 
        } else {
            ctx.fillStyle = isLightMode ? '#475569' : '#cbd5e1';
        }
        ctx.fillText(labels[j], px, py);
    }
    
    document.getElementById('eRcl').innerText = vals[1]; document.getElementById('eBuy').innerText = vals[3];
    document.getElementById('eSwg').innerText = vals[2]; document.getElementById('ePan').innerText = vals[0];
}

function drawCanvas() {
    const cvs = document.getElementById('trajCanvas'), ctx = cvs.getContext('2d');
    const rect = cvs.parentElement.getBoundingClientRect(), dpr = window.devicePixelRatio || 1;
    cvs.width = rect.width*dpr; cvs.height = rect.height*dpr; ctx.scale(dpr, dpr);
    const w = rect.width, h = rect.height; ctx.clearRect(0,0,w,h);
    
    ctx.fillStyle = isLightMode ? '#475569' : 'rgba(255,255,255,0.6)'; ctx.font = '10px sans-serif'; ctx.textAlign = 'center';
    for(let i=1; i<10; i++) { 
        let x = (w/10)*i; ctx.beginPath(); ctx.strokeStyle = isLightMode ? '#e2e8f0' : '#1e293b'; ctx.moveTo(x,20); ctx.lineTo(x,h); ctx.stroke(); 
        ctx.fillText(i+'m', x, 14);
    }
    ctx.strokeStyle = 'rgba(16, 185, 129, 0.4)'; ctx.setLineDash([5, 5]); ctx.beginPath(); ctx.moveTo(0,20); ctx.lineTo(w,20); ctx.stroke(); ctx.setLineDash([]);
    ctx.beginPath(); ctx.strokeStyle = isLightMode ? '#0284c7' : '#38bdf8'; ctx.lineWidth = 3; ctx.moveTo(0, 20);
    trajData.forEach(p => ctx.lineTo((p.dist/10)*w, 20 + (p.drop/100)*(h-40)));
    ctx.stroke();
    window.chartSnapshot = ctx.getImageData(0,0,cvs.width,cvs.height);
}

function updateScrubber() {
    if(!trajData.length) return;
    const val = parseFloat(document.getElementById('distScrubber').value);
    document.getElementById('scrubDistTxt').innerText = val.toFixed(1);
    let p = trajData.reduce((prev, curr) => Math.abs(curr.dist-val) < Math.abs(prev.dist-val) ? curr : prev);
    document.getElementById('liveDrop').innerText = p.drop.toFixed(1);
    document.getElementById('liveSpeed').innerText = p.speed.toFixed(1);
    document.getElementById('liveEnergy').innerText = p.energy.toFixed(0);
    
    if(val===4.0 || Math.abs(val-4.0)<0.1) { document.getElementById('eEgy').innerText = p.energy.toFixed(0); document.getElementById('eDrp').innerText = p.drop.toFixed(1); }

    const g = document.getElementById('aimGuideTxt');
    if (p.energy<25) { g.innerText = t('aim_warn'); g.style.color = '#ef4444'; }
    else {
        g.style.color = '#10b981';
        if (p.drop<=2.0) g.innerText = t('aim_0'); else if (p.drop<=7.0) g.innerText = t('aim_1'); else g.innerText = t('aim_2', (p.drop-7.0).toFixed(1));
    }
    const cvs = document.getElementById('trajCanvas'), ctx = cvs.getContext('2d'), w = cvs.width/(window.devicePixelRatio||1), h = cvs.height/(window.devicePixelRatio||1);
    if(window.chartSnapshot) ctx.putImageData(window.chartSnapshot, 0, 0);
    let px = (p.dist/10)*w, py = 20 + (p.drop/100)*(h-40);
    ctx.beginPath(); ctx.setLineDash([4,4]); ctx.strokeStyle = '#ef4444'; ctx.lineWidth = 1; ctx.moveTo(px,20); ctx.lineTo(px,h); ctx.stroke(); ctx.setLineDash([]);
    ctx.beginPath(); ctx.arc(px,py,5,0,Math.PI*2); ctx.fillStyle = '#ef4444'; ctx.fill();
    ctx.font = 'bold 12px sans-serif'; ctx.textAlign = 'left';
    let txt = `${t('drop')}: ${p.drop.toFixed(1)} cm`, tw = ctx.measureText(txt).width, lx = px+10;
    if(lx+tw>w) lx = px-tw-10; 
    ctx.fillText(txt, lx, py-5);
}

function prepareExportData() {
    const sel = id => document.getElementById(id).options[document.getElementById(id).selectedIndex].text;
    document.getElementById('expGun').innerText = `${document.getElementById('gunLen').value}cm / ${sel('sysType')} / ${sel('gunShape')}`;
    document.getElementById('expWeight').innerText = `${document.getElementById('resWeight').innerText}kg`;
    
    let extStr = document.getElementById('sysType').value !== 'standard' ? ` (Ext:${document.getElementById('extLen').value}cm)` : '';
    document.getElementById('expBandModel').innerText = `${sel('bandBrand')} - ${sel('bandModel')}`;
    document.getElementById('expBandData').innerText = `${document.getElementById('stretchRatioVal').innerText} / ${document.getElementById('resCutLen').innerText}${extStr}`;
    
    document.getElementById('expForce').innerText = document.getElementById('resForce').innerText;
    document.getElementById('expShaft').innerText = `${document.getElementById('shaftLen').value}cm / ${sel('shaftDia')} / ${sel('flopperType')}`;
    
    const rdrCvs = document.getElementById('radarCanvas');
    document.getElementById('expRadarImg').src = rdrCvs.toDataURL('image/png', 1.0);
    const sc = document.getElementById('expScoreVal'); sc.innerText = currentScore;
    sc.style.color = document.getElementById('resScore').style.color;
}

function exportConfig() {
    if(typeof html2canvas === 'undefined') return alert("网络加载组件失败");
    const tg = document.getElementById('exportCanvas'); tg.style.left='0'; tg.style.top='0'; tg.style.zIndex='-1';
    
    html2canvas(tg, { scale: 2 }).then(c => {
        tg.style.left='-9999px';
        const imgD = c.toDataURL('image/png');
        if(/iPad|iPhone|iPod|MicroMessenger/i.test(navigator.userAgent) && !window.MSStream) {
            const ov = document.createElement('div'); ov.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;';
            const tp = document.createElement('div'); tp.innerText = '请长按下方图片保存到相册'; tp.style.cssText = 'color:#fff;margin-bottom:20px;font-weight:bold;';
            const ig = document.createElement('img'); ig.src = imgD; ig.style.cssText = 'max-width:90%;max-height:80%;border-radius:8px;';
            ov.appendChild(tp); ov.appendChild(ig); ov.onclick = () => document.body.removeChild(ov); document.body.appendChild(ov);
        } else {
            const l = document.createElement('a'); l.download = `MH_${new Date().getTime()}.png`; l.href = imgD; l.click();
        }
    }).catch(e => { tg.style.left='-9999px'; alert("截图生成失败"); });
}

window.onload = initUI;
</script>
